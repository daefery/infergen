# cargo-release configuration for Infergen workspace.
#
# Install:   cargo install cargo-release
# Docs:      https://github.com/crate-ci/cargo-release
# Min version: cargo-release 0.25 (supports {{prev_version}} in replacements)
#
# Usage:
#   cargo release patch   # 0.0.0 → 0.0.1  (bug fixes)
#   cargo release minor   # 0.0.0 → 0.1.0  (new features)
#   cargo release major   # 0.0.0 → 1.0.0  (breaking changes)
#
# What this does (in order):
#   1. Bumps [workspace.package] version in Cargo.toml
#   2. Promotes CHANGELOG.md [Unreleased] → [{{version}}]
#   3. Syncs npm package versions
#   4. Creates a signed commit: "chore: release v{{version}}"
#   5. Creates an annotated git tag: "v{{version}}"
#
# Push + publish are intentionally disabled — CI handles both:
#   - cargo-dist release.yml builds + publishes binaries on tag push
#   - publish-npm.yml publishes @infergen/runtime to npm on tag push

[workspace]

sign-commit = false
sign-tag    = false

# Never publish from local machine — CI publishes to npm/crates.io.
publish = false

# Let CI push after the tag is created.
push = false

# Git commit message for the version bump.
pre-release-commit-message = "chore: release v{{version}}"

# Annotated tag message (matched by cargo-dist's release.yml trigger).
tag-message = "Release v{{version}}"

# Tag name — must match cargo-dist trigger pattern: [0-9]+.[0-9]+.[0-9]+*
tag-name = "v{{version}}"

# File substitutions run before the version bump commit.
pre-release-replacements = [
  # Promote CHANGELOG [Unreleased] header to the new version.
  { file = "CHANGELOG.md", search = "## \\[Unreleased\\]", replace = "## [Unreleased]\n\n---\n\n## [{{version}}] — {{date}}", min = 1 },
  # Update [Unreleased] diff link + add new version diff link at the bottom.
  { file = "CHANGELOG.md", search = "\\[Unreleased\\]: https://github.com/infergen/infergen/compare/v{{prev_version}}\\.\\.\\.", replace = "[Unreleased]: https://github.com/infergen/infergen/compare/v{{version}}...HEAD\n[{{version}}]: https://github.com/infergen/infergen/compare/v{{prev_version}}...v{{version}}", min = 0 },
  # Sync @infergen/runtime npm version.
  { file = "packages/runtime/package.json", search = "\"version\": \"{{prev_version}}\"", replace = "\"version\": \"{{version}}\"", min = 0 },
  # Sync vscode-infergen extension version.
  { file = "packages/vscode-infergen/package.json", search = "\"version\": \"{{prev_version}}\"", replace = "\"version\": \"{{version}}\"", min = 0 },
]
